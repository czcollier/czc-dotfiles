env = WLR_NO_HARDWARE_CURSORS,1
env = PROTOCOL_TIMEOUT,1


env = PATH,$HOME/.nix-profile/bin:$PATH

env = SSH_AUTH_SOCK,/home/czcollier/.tmp/.czcollier.ssh_auth_sock

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,gtk3 
#env = XDG_DATA_DIRS,$HOME/.local/state/nix/profiles/profile/share:$XDG_DATA_DIRS
# --- MONITORS ---
# Internal laptop screen
monitor = eDP-1, preferred, auto, 1
# External monitor (DP-1) - positioning it at 0x0
monitor = DP-1, preferred, auto, 1
# Fallback for anything else
monitor = , preferred, auto, 1

# attach laptop clamshell + external monitor manager script to lid events
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/handle_monitors.sh --clamshell
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/handle_monitors.sh --clamshell

# --- RUN AT STARTUP ---

# Update the D-Bus activation environment so Chrome sees it
exec-once = dbus-update-activation-environment --systemd SSH_AUTH_SOCK WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_DATA_DIRS
exec-once = /usr/lib/x86_64-linux-gnu/libexec/polkit-kde-authentication-agent-1
exec-once = /usr/lib/xdg-desktop-portal-hyprland

# laptop clamshell + external monitor manager script
exec-once = /home/czcollier/.config/hypr/scripts/handle_monitors.sh

# Debian binary - may break in the future
exec-once = hypridle
exec-once = XDG_DATA_DIRS=/usr/local/share:/usr/share:$HOME/.local/state/nix/profiles/profile/share:$XDG_DATA_DIRS noctalia-shell
exec-once = awww-daemon
exec-once = wl-paste --watch cliphist store

# --- BINDINGS ---

$mainMod = SUPER
$ipc = noctalia-shell ipc call

bind = $mainMod SHIFT CTRL, p, exec, ~/scripts/panelctl.sh toggle
# -- application launchers --

# Launch Rofi as an application launcher
#bind = $mainMod, Space, exec, ~/.config/rofi/scripts/launcher_t4 -show drun -show-icons
bind = $mainMod, SPACE, exec, $ipc launcher toggle

bind = $mainMod CTRL, T, exec, foot


bind = $mainMod, F, fullscreen, 1 
# center the active window (if floating)
bind = $mainMod ALT, c, moveactive, 400 400

bind = $mainMod, Q, killactive,
bind = $mainMod CTRL ALT SHIFT, M, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod CTRL SHIFT, P, exec, hyprctl dispatch pin
# Move focus with mainMod + hjkl
bind = $mainMod, H, exec, ~/.config/hypr/scripts/smart_focus.sh l
bind = $mainMod, L, exec, ~/.config/hypr/scripts/smart_focus.sh r 
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

#bind = $mainMod, L, exec, ~/.config/hypr/scripts/focus_wrap.sh r
#bind = $mainMod, H, exec, ~/.config/hypr/scripts/focus_wrap.sh l

# Move window with mainMod + shift + hjkl
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# switch windows in tab group
bind = $mainMod, P, changegroupactive, b
bind = $mainMod, N, changegroupactive, f

# --- master mode layout switching ---

bind = $mainMod, S, layoutmsg, swapwithmaster
bind = $mainMod, Z, exec, hyprctl dispatch layoutmsg orientationleft
bind = $mainMod, X, exec, hyprctl dispatch layoutmsg orientationcenter
bind = $mainMod, C, exec, hyprctl dispatch layoutmsg orientationright

# --- master mode change master width ---
binde = $mainMod, right, resizeactive, 50 0
binde = $mainMod, left, resizeactive, -50 0
binde = $mainMod, down, resizeactive, 0 50
binde = $mainMod, up, resizeactive, 0 -50

# --- for dwindle mode ---
bind = $mainMod, T, layoutmsg, togglesplit

# --- workspaces ---

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with h, l
bind = $mainMod CTRL, H, workspace, e-1 
bind = $mainMod CTRL, L, workspace, e+1

# Scroll through existing workspaces with < >
bind = $mainMod CTRL SHIFT, H, movetoworkspacesilent, e-1 
bind = $mainMod CTRL SHIFT, L, movetoworkspacesilent, e+1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

# lock screen - Debian binary - may break in the future
bind = CONTROL SHIFT, L, exec, /usr/bin/hyprlock

# bind to toggle the special workspace (e.g., SUPER + ALT + T)
bind = $mainMod ALT, T, movetoworkspace, +0 # Optional: move focus to it
bind = $mainMod ALT, T, exec, $HOME/.config/hypr/scripts/toggle_app.sh foot foot termscratch

# --- crazy group bindings ---
# 1. Direct Bind for creating/toggling a group
bind = SUPER, G, togglegroup
# 2. Enter the 'move-into-group' submap
bind = SUPER, I, submap, movegroup
# 3. Define the submap behavior
submap = movegroup
# Bind h, j, k, l to move the active window into a group in that direction
# 'catchall' or specific binds will exit the submap back to 'reset'
binde = , h, moveintogroup, l
binde = , h, submap, reset
binde = , l, moveintogroup, r
binde = , l, submap, reset
binde = , k, moveintogroup, u
binde = , k, submap, reset
binde = , j, moveintogroup, d
binde = , j, submap, reset
# Use escape to cancel and go back to normal mode
bind = , escape, submap, reset
# IMPORTANT: Do not forget to reset the submap at the end!
submap = reset
# move current out of group 
bind = $mainMod, O, exec, hyprctl dispatch moveoutofgroup 
bind = $mainMod, U, exec, hyprctl dispatch lockactivegroup toggle
# --- end crazy group bindings ---

# --- screenshot ---
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- window "hiding" ---
# Move the active window to the special workspace (Hide)
bind = $mainMod CTRL, X, movetoworkspacesilent, special:hidden
# Toggle the special workspace visibility (Restore/View)
bind = $mainMod CTRL, S, togglespecialworkspace, hidden
# Pull the focused window from Special back to your current workspace
# Force the window into the workspace you are currently viewing
bind = $mainMod CTRL, U, exec, hyprctl dispatch movetoworkspace $(hyprctl monitors -j | jq -r '.[] | select(.focused == true) | .activeWorkspace.id')

# toggle floating window
bind = $mainMod SHIFT, Space, togglefloating, 
bind = $mainMod SHIFT, Space, resizeactive, exact 40% 90%
bind = $mainMod SHIFT, Space, centerwindow,

# alt-tab switch between windows in a floating workspace
bind = ALT, Tab, cyclenext, # change focus to another window
bind = ALT, Tab, bringactivetotop, # bring it to the top

# scrolling layout
bind = $mainMod, period, layoutmsg, focus r
bind = $mainMod, comma, layoutmsg, focus l
bind = $mainMod, equal, layoutmsg, colresize 1.0
bind = $mainMod, minus, layoutmsg, colresize 0.5

# dynamically change opacity
binde = $mainMod CONTROL, bracketright, exec, hyprctl dispatch setprop active opacity $(hyprctl getprop active opacity | awk '{print ($1 + 0.1 > 1.0 ? 1.0 : $1 + 0.1)}')
binde = $mainMod CONTROL, bracketleft, exec, hyprctl dispatch setprop active opacity $(hyprctl getprop active opacity | awk '{print ($1 - 0.1 < 0.1 ? 0.1 : $1 - 0.1)}')

bind = $mainMod CONTROL, F, moveactive, exact 30% 5%
bind = $mainMod CONTROL, F, resizeactive, exact 40% 90% 

binde = $mainMod SHIFT, left, moveactive, -40 0 
binde = $mainMod SHIFT, right, moveactive, 40 0 
binde = $mainMod SHIFT, up, moveactive, 0 -40 
binde = $mainMod SHIFT, down, moveactive, 0 40 

# --- General UI Rules ---
layerrule {
    name = rofi
    match:namespace = ^rofi$
    blur = on
    ignore_alpha = 0.9
}

windowrule {
    name = cider
    match:title = ^Cider.*
    #opacity = 0.95
    border_color = rgba(33ccffee) rgba(00ff99ee) 45deg
}
windowrule {
    name = vscode
    match:class = ^code$
    opacity = 0.9
}

windowrule {
    name = nautilus
    match:class = ^org.gnome.Nautilus$
    float = on
}

windowrule {
    name = rofi
    opacity = 0.7
    rounding = 8
    match:class = ^Rofi$
    float = on
    #xray = on
    dim_around = on
}

windowrule {
    name = calc
    match:class = ^org.gnome.Calculator$
    float = on
}

windowrule {
    name = blueman-applet 
    match:class = ^blueman-applet$
    float = on
}


# --- System Dialogs ---
windowrule {
    name = system_dialogs 
    match:class = ^xdg-desktop-portal-gtk$
    float = on
    size = 900 700
}

windowrule {
    name = image_viewer
    match:class = ^org.gnome.Loupe$
    float = on
    size = 900 700
}

#windowrule {
#   name = "term-noanim"
#   match:class = ^(foot)$
#   workspace = special:termscratch
#   animation = specialworkspace, 0.1, 0.1, default, slidevert
#   animation = windowsIn, 0 
#   animation = windowsMove, 0
#   animation = fadeIn, 0 
#   no_anim = true
#}

windowrule {
    name = utility_size
    match:class = ^(.*pavucontrol|blueman-manager|nm-connection-editor)$
    workspace = special:tools
    animation = specialWorkspace, 0
    size = 700 500
    float = on
    move = (monitor_w-window_w-200) 50
    opacity = 0.9 0.8
    no_anim = true
    animation = windowsIn, 0
    animation = windowsMove, 0
    animation = fadeIn, 0
}

windowrule {
    name = calendar
    match:class = ^org.gnome.Calendar$
    size = 800 600
    move = 10 50
    opacity = 0.9 0.8
    float = true
    no_anim = true
    animation = windowsIn, 0
    animation = windowsMove, 0
    animation = fadeIn, 0
}

# g3 alerts have no window class
windowrule {
    name = g3d
    match:class = ^$
    match:title = ^$
    float = on
    move = 10 50
    size = 350 120
    
    border_size = 2 
    border_color = rgba(ff33ccee) rgba(ffcc33dd) 45deg
}

windowrule {
    name = upload_auth
    match:class = ^(chrome-pmhkaepabdniocnppdkfgifgonahhpdi-Profile_1)$
    float = on
    fullscreen = false
    suppress_event = [fullscreen, maximize]
    fullscreen_state = 0 0 
    maximize = false
    #move = 10 50
    size = 590 660 
    border_size = 5
    border_color = rgba(ff33ccee) rgba(ffcc33dd) 45deg
}

windowrule {
    name = google_apps
    match:title = ^.*(Gmail|Google Calendar|Google Chat).*$
    group = set always invade override lock
    group = set on
    border_color = rgba(ff33ccee) rgba(ff3333dd) 45deg
    #pin = yes
}

windowrule {
  name = fullscreen_border
  match:fullscreen_state_client = 1
  border_color = rgba(ff33ccee) rgba(ffcc33dd) 45deg
  border_size = 3
}

windowrule {
  name = float_border 
  match:float = 1
  border_color = rgba(ff33ccee) rgba(ffccffdd) 45deg
  border_size = 3
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

plugin {
    hyprbars {
        bar_height = 20
        hyprbars-button = rgb(ff4040), 10, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(eeee11), 10, , hyprctl dispatch fullscreen 1
    }
}

experimental {
}

render {
  direct_scanout = 1
  cm_auto_hdr = 1
  cm_enabled = true
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    natural_scroll = true
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 5 
    gaps_out = 10 
    border_size = 3
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = on
}

group {
    col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.border_inactive = rgba(595959aa)
    insert_after_current = true
    # auto_group = no 
    groupbar {
        enabled = yes
        rounding = 12
        render_titles = yes 
        gradients = yes
        font_family = Adwaita Sans
        #text_offset = 0 
        indicator_gap = 2 
        height = 24
        indicator_height = 2
        font_size = 13
        text_color = rgba(E0E9FFff)
        col.active = rgba(2266FF77) rgba(2266FF77) rgba(2266FF77)
        col.inactive = rgba(5599FF55) rgba(5599FF55) rgba(5599FF55)
        col.locked_active = rgba(44444477) rgba(44444477) rgba(2266FF77)
        col.locked_inactive = rgba(55555577) rgba(55555577) rgba(55555577)
    }
}

decoration {
    rounding = 12 
    rounding_power = 2 
    active_opacity = 1
    #dim_inactive = true
    #dim_strength = 0.1

    shadow {
      enabled = yes
      range = 4
      render_power = 3 
      color = rgba(1a1a1aee)
      #offset = 1, 1
    }

    blur {
        enabled = yes
        size = 3 
        passes = 2
        vibrancy = 0.1696
        new_optimizations = on
        brightness = 1.0
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 0.1, 0.1, default
    animation = specialWorkspace, 0.1, 0.1, default, slide 
}

dwindle {
    preserve_split = yes # you probably want this
}

master {
    #new_on_top = true
    orientation = left
    new_status = slave
    always_keep_position = yes
    #slave_count_for_center_master = 0
    #mfact = 0.4
}

scrolling {
  column_width = 0.5
}

gestures {
  gesture = 3, horizontal, workspace
}

# Example per-device config
device:epic mouse V1 {
    #sensitivity = -0.5
}

misc {
    focus_on_activate = true
    animate_mouse_windowdragging = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}
