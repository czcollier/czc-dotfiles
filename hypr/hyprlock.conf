# BACKGROUND
background {
    #path = /home/czcollier/.config/hypr/hyprlock.png
    path = screenshot
    color = rgba(25, 20, 40, 1.0)
    blur_passes = 3
    blur_size = 8
    noise = 0.0517
    contrast = 0.8916
    brightness = 0.6172
    vibrancy = 0.3696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
}

# Time-Hour
label {
    monitor =
    text = cmd[update:1000] echo "<span font_weight='extrabold'>$(date +"%I")</span>"
    color = rgba(255, 255, 255, 1)
    font_size = 140
    font_family = Google Sans Flex
    position = -90, 200
    halign = center
    valign = center
}

# Time-Minute
label {
    monitor =
    text = cmd[update:1000] echo "<span font_weight='extrabold'>$(date +"%M")</span>"
    color = rgba(147, 196, 255, 1)
    font_size = 140
    font_family = Google Sans Flex
    position = 10, 80
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%a, %d %B.")"
    color = rgba(255, 255, 255, 100)
    font_size = 22
    font_family = Google Sans Flex
    position = 20, -8
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(216, 222, 233, 0.80)
    font_size = 22
    font_family = SF Pro Display Bold
    position = 0, -220
    halign = center
    valign = center
}


# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Cousine Nerd Font
    placeholder_text = <i><span foreground="##ffffff99" font_style="italic">Enter Pass</span></i>
    hide_input = false
    position = 0, -290
    halign = center
    valign = center
}
