[main]
font=Cousine Nerd Font Mono:size=10
#font-bold=Cousine Nerd Font Mono:size=10
initial-window-size-chars=140x85
pad=5x5
#bold-text-in-bright=yes

[csd]
#color=324154
color=EE425164
size=32
font=Aroania:size=8
button-width=32
border-width=1

[bell]
system=no
notify=no
visual=no

[colors]
alpha=0.93
#foreground=c0caf5
foreground=f8f8f2
background=1a1b26

## Normal/regular colors (c)
regular0=000000
regular1=ff5555
regular2=50fa7b
regular3=f0fa8b
regular4=bd92f8
regular5=ff78c5
regular6=8ae9fc
regular7=bbbbbb

## Bright colors (color palette 8-15)
bright0=414868   # bright black
bright1=f7768e   # bright red
bright2=9ece6a   # bright green
bright3=e0af68   # bright yellow
bright4=7aa2f7   # bright blue
bright5=bb9af7   # bright magenta
bright6=7dcfff   # bright cyan
bright7=c0caf5   # bright white

## dimmed colors (see foot.ini(5) man page)
dim0=ff9e64
dim1=db4b4b

[security]
# Options: enabled, disabled, copy-enabled, paste-enabled
# 'enabled' allows both reading and writing (required for full OSC 52 support)
osc52=enabled
